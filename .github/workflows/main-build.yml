name: Android CI
# GOAL https://gist.github.com/alexanderbazo/227476190ef5ab655795e34ec0d314d6

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" , "develop" ]

jobs:
  build_and_test_app:
    runs-on: ubuntu-latest

    env:
      PANDASCORE_DEMO_API_TOKEN: ${{secrets.PANDASCORE_DEMO_API_TOKEN}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Use latest stable version

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # Use latest stable version
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Optional: Upload Artifacts (e.g., APK)
      # - name: Upload Production Debug APK
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: app-prod-debug.apk
      #     path: app/build/outputs/apk/prod/debug/app-prod-debug.apk